# GoReleaser 配置
# 文档: https://goreleaser.com

version: 2

project_name: loomcode

before:
  hooks:
    - go mod tidy

builds:
  - id: loomcode
    main: ./cmd/loomcode
    binary: loomcode
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"
  - id: loom
    main: ./cmd/loomcode
    binary: loom
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ['tar.gz']
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  draft: true
  prerelease: auto
  footer: |
    ## LoomCode CLI — 双螺旋 · 多模型 · 可扩展
    
    **Quick Install:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/ShawnLiuSZ/LoomCode/main/scripts/install.sh | bash
    ```
    
    **Usage:**
    ```bash
    loomcode                          # Start interactive TUI (or: loom)
    loomcode --session <id>           # Resume a session
    loomcode run "your task"          # Single task mode
    echo "task" | loomcode run        # Pipe mode
    ```

brews:
  - name: loomcode
    repository:
      owner: ShawnLiuSZ
      name: homebrew-loomcode
    homepage: "https://github.com/ShawnLiuSZ/loomcode"
    description: "LoomCode CLI - 双螺旋 · 多模型 · 可扩展"
    license: "MIT"
    install: |
      bin.install "loomcode"
      bin.install "loom"
    test: |
      system "#{bin}/loomcode --help"
      system "#{bin}/loom --help"
