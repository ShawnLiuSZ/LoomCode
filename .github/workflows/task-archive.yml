name: Archive Task on PR Merge

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number of the task.md to archive (testing only)'
        required: true
        type: string
      pr_number:
        description: 'PR number to record in archive metadata (testing only, optional)'
        required: false
        type: string
        default: '0'
      base_branch:
        description: 'Target branch to checkout and archive from (testing only)'
        required: true
        type: string
        default: 'develop'

jobs:
  archive-task:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Determine target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.base_branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}

      - name: Extract issue number and archive
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ steps.target.outputs.branch }}
        with:
          script: |
            const fs = require('fs');
            const targetBranch = process.env.TARGET_BRANCH;
            let issueNumber, prNumber, mergedBy, headRef, baseRef;
            if (context.eventName === 'workflow_dispatch') {
              issueNumber = '${{ github.event.inputs.issue_number }}';
              prNumber = '${{ github.event.inputs.pr_number }}' || '0';
              mergedBy = 'manual-test';
              headRef = 'manual-test';
              baseRef = targetBranch;
            } else {
              const pr = context.payload.pull_request;
              const body = pr.body || '';
              const bodyMatch = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
              // Extract issue number from last path segment (align with task-init.yml)
              // Supports: feature/463-xxx, feature/dm/347-xxx, bugfix/FB-1029-xxx
              const lastSegment = pr.head.ref.split('/').pop().replace(/^FB-/, '');
              const branchMatch = lastSegment.match(/^(\d+)/);
              issueNumber = bodyMatch?.[1] || branchMatch?.[1];
              prNumber = pr.number;
              mergedBy = pr.merged_by?.login || 'unknown';
              headRef = pr.head.ref;
              baseRef = pr.base.ref;
            }
            if (!issueNumber) {
              console.log('No issue number found, skipping archive.');
              return;
            }
            const sourceFile = 'doc/version/current/tasks/task-' + issueNumber + '.md';
            const archiveDir = 'doc/tasks/archived';
            const archiveFile = archiveDir + '/task-' + issueNumber + '.md';
            if (!fs.existsSync(sourceFile)) {
              console.log(sourceFile + ' not found, skipping.');
              return;
            }
            if (!fs.existsSync(archiveDir)) {
              fs.mkdirSync(archiveDir, { recursive: true });
            }
            let content = fs.readFileSync(sourceFile, 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const archiveLines = [
              '',
              '---',
              '',
              '## 归档信息',
              '',
              '- **PR:** #' + prNumber,
              '- **合并时间:** ' + today,
              '- **合并人:** ' + mergedBy,
              '- **分支:** ' + headRef + ' → ' + baseRef,
              '',
            ];
            content += archiveLines.join('\n');
            fs.writeFileSync(archiveFile, content);
            fs.unlinkSync(sourceFile);
            console.log('Archived task-' + issueNumber + '.md');

      - name: Commit and push
        env:
          ISSUE_NUM: ${{ github.event.inputs.issue_number || '0' }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number || '0' }}
          TARGET_BRANCH: ${{ steps.target.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/
          git diff --cached --quiet && echo "No changes" && exit 0
          ITERATION_SUFFIX=""
          if grep -q '^## 🔄 新迭代' "doc/tasks/archived/task-${ISSUE_NUM}.md" 2>/dev/null; then
            ITERATION_SUFFIX=" (iteration)"
          fi
          git commit -m "docs: archive task-${ISSUE_NUM} after PR #${PR_NUM} merge${ITERATION_SUFFIX} [auto]"
          git push origin HEAD:${TARGET_BRANCH}
