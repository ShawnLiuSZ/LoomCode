# Helix CLI 示例配置
# 复制此文件为 helix.toml 并根据需要修改

# 默认 Provider（可选，不填则使用第一个 provider）
default_provider = "deepseek"

# ============================================================
# Provider 定义
# ============================================================

[[providers]]
name         = "deepseek"
display_name = "DeepSeek"
kind         = "deepseek"
base_url     = "https://api.deepseek.com"
api_key_env  = "DEEPSEEK_API_KEY"
default_model = "deepseek-v4-flash"

  [[providers.models]]
  id             = "deepseek-v4-flash"
  name           = "DeepSeek V4 Flash"
  context_window = 131072

  [providers.models.cost]
  input        = 0.14
  cached_input = 0.014
  output       = 0.28

  [providers.models.capabilities]
  tool_call    = true
  prefix_cache = true

  [[providers.models]]
  id             = "deepseek-v4-pro"
  name           = "DeepSeek V4 Pro"
  context_window = 131072

  [providers.models.cost]
  input        = 0.55
  cached_input = 0.055
  output       = 2.19

  [providers.models.capabilities]
  reasoning   = true
  tool_call   = true
  prefix_cache = true

