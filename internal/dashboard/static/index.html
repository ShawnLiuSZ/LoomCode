<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoomCode Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LoomCode Dashboard</h1>
            <div class="status-bar" role="status" aria-live="polite">
                <span id="deepseek-status" aria-label="DeepSeek status">DeepSeek</span>
                <span id="mimo-status" aria-label="MiMo status">MiMo</span>
                <span id="openai-status" aria-label="OpenAI status">OpenAI</span>
                <span id="cost-total" aria-label="Total cost">Cost: $0.00</span>
            </div>
        </header>

        <div id="error-container"></div>

        <main>
            <aside class="sidebar" aria-label="Session list">
                <h2>Sessions</h2>
                <ul id="session-list" role="listbox" aria-label="Sessions"></ul>
            </aside>

            <section class="content" aria-label="Session details and cost chart">
                <div id="session-details">
                    <p class="empty-state">Select a session to view details</p>
                </div>

                <div id="cost-chart">
                    <h3>Cost History</h3>
                    <canvas id="chart" role="img" aria-label="Cost history line chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
